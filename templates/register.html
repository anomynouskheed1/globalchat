{{template "head" .}}
{{template "nav" .}}

<section class="auth-section">
  <div class="auth-container reveal">
    <div class="auth-card glass">
      <div class="auth-header">
        <span class="logo-icon">💬</span>
        <h2>Join GlobalChat</h2>
        <p>Free to join. Start earning today.</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('signup', this)">Sign Up</button>
        <button class="auth-tab" onclick="switchTab('login', this)">Login</button>
      </div>

      <!-- SIGN UP -->
      <form class="auth-form" id="signup" onsubmit="handleAuth(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="Your full name" required />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Phone (M-Pesa)</label>
          <input type="tel" placeholder="+254 7XX XXX XXX" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Min. 8 characters" required />
        </div>
        <div class="form-check">
          <input type="checkbox" id="terms" required />
          <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
        </div>
        <button type="submit" class="btn-primary btn-full">Create Free Account</button>
        <div class="divider"><span>or continue with</span></div>
        <div class="social-btns">
          <button type="button" class="btn-social">🔵 Google</button>
          <button type="button" class="btn-social">📘 Facebook</button>
        </div>
      </form>

      <!-- LOGIN -->
      <form class="auth-form hidden" id="login" onsubmit="handleAuth(event)">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Your password" required />
        </div>
        <div class="form-row-between">
          <label class="form-check"><input type="checkbox" /> Remember me</label>
          <a href="#" class="link-small">Forgot password?</a>
        </div>
        <button type="submit" class="btn-primary btn-full">Login</button>
        <div class="divider"><span>or continue with</span></div>
        <div class="social-btns">
          <button type="button" class="btn-social">🔵 Google</button>
          <button type="button" class="btn-social">📘 Facebook</button>
        </div>
      </form>

      <div class="security-badges">
        <span>🔒 SSL Secured</span>
        <span>✅ Verified Platform</span>
        <span>🛡️ GDPR Compliant</span>
      </div>
    </div>
  </div>
</section>

{{template "footer" .}}
