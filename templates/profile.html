{{template "head" .}}
{{template "nav" .}}

<section class="profile-section">

  <div class="profile-container">

    <!-- PROFILE CARD -->
    <div class="profile-card glass">

      <div class="profile-top">

        <div class="profile-avatar" id="avatarInitials">
          GC
        </div>

        <div class="profile-info">

          <h2 id="profileName">
            GlobalChat User
          </h2>

          <p id="profileEmail">
            user@email.com
          </p>

          <span class="member-badge">
            Member
          </span>

        </div>

      </div>

      <div class="profile-details">

        <div class="detail-item">
          <span>📱 Phone</span>
          <strong id="profilePhone">
            Not Added
          </strong>
        </div>

        <div class="detail-item">
          <span>📅 Joined</span>
          <strong id="profileJoined">
            2026
          </strong>
        </div>

      </div>

      <div class="profile-actions">

        <button class="btn-primary" onclick="toggleEditProfile()">
          Edit Profile
        </button>

      </div>

    </div>

    <!-- EDIT PROFILE -->
    <div class="profile-card glass hidden" id="editProfileCard">

      <h3>Edit Profile</h3>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="editName" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="editEmail" />
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="editPhone" />
      </div>

      <div class="profile-actions">

        <button class="btn-primary" onclick="saveProfile()">
          Save Changes
        </button>

        <button class="btn-outline" onclick="toggleEditProfile()">
          Cancel
        </button>

      </div>

    </div>

  </div>

</section>

<script>

  function getInitials(name) {

    if (!name) return "GC";

    const names = name.split(" ");

    let initials = "";

    names.forEach(n => {
      initials += n.charAt(0);
    });

    return initials.toUpperCase();
  }

  function loadProfile() {

    const user = JSON.parse(localStorage.getItem("globalchat_user"));

    if (!user) {

      window.location.href = "/register";

      return;
    }

    document.getElementById("profileName").innerText =
      user.name || "GlobalChat User";

    document.getElementById("profileEmail").innerText =
      user.email || "No Email";

    document.getElementById("profilePhone").innerText =
      user.phone || "Not Added";

    document.getElementById("avatarInitials").innerText =
      getInitials(user.name);

    // EDIT FIELDS

    document.getElementById("editName").value =
      user.name || "";

    document.getElementById("editEmail").value =
      user.email || "";

    document.getElementById("editPhone").value =
      user.phone || "";
  }

  function toggleEditProfile() {

    document.getElementById("editProfileCard")
      .classList.toggle("hidden");
  }

  function saveProfile() {

    const updatedUser = {

      name: document.getElementById("editName").value,

      email: document.getElementById("editEmail").value,

      phone: document.getElementById("editPhone").value
    };

    localStorage.setItem(
      "globalchat_user",
      JSON.stringify(updatedUser)
    );

    loadProfile();

    toggleEditProfile();

    alert("Profile updated successfully!");
  }

  loadProfile();

</script>

<style>
  .profile-section {
    padding: 80px 20px;
  }

  .profile-container {
    max-width: 700px;
    margin: auto;
  }

  .profile-card {
    padding: 30px;
    border-radius: 20px;
    margin-bottom: 25px;
  }

  .profile-top {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .profile-avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: #00b894;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: bold;
    color: #fff;
  }

  .profile-info h2 {
    margin: 0;
  }

  .profile-info p {
    opacity: .8;
    margin-top: 5px;
  }

  .member-badge {
    display: inline-block;
    margin-top: 10px;
    padding: 6px 14px;
    border-radius: 20px;
    background: #00b894;
    color: #fff;
    font-size: 14px;
  }

  .profile-details {
    margin-top: 30px;
  }

  .detail-item {
    display: flex;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255, 255, 255, .08);
  }

  .profile-actions {
    margin-top: 25px;
    display: flex;
    gap: 15px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #333;
    background: #111;
    color: #fff;
  }

  .btn-primary,
  .btn-outline {
    padding: 14px 22px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
  }

  .btn-primary {
    background: #00b894;
    color: #fff;
  }

  .btn-outline {
    background: transparent;
    border: 1px solid #00b894;
    color: #fff;
  }

  .hidden {
    display: none;
  }
</style>

{{template "footer" .}}
